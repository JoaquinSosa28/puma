name: Build and publish image

# Tagging strategy:
#   - push to a feature branch -> <short-sha>   (temporary build for that commit)
#   - push to main             -> latest
#   - push a git tag vX.Y.Z    -> X.Y.Z, X.Y, X (semver from the tag)
on:
  push:
    branches: ['**']
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  # Repo is named "-puma" (leading dash), which is not a valid Docker image
  # name, so we publish under a clean name: ghcr.io/<owner>/puma
  IMAGE_NAME: ${{ github.repository_owner }}/puma

jobs:
  # Quality gate: no image is published unless typecheck, lint, unit tests,
  # and a production build all pass.
  test:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  build-and-push:
    needs: test
    # Native arm64 runner — matches the VM (aarch64) and avoids QEMU emulation,
    # which crashes `npm ci` with "illegal instruction" when emulating arm64.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,enable=${{ startsWith(github.ref, 'refs/heads/') && github.ref != 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
