name: Build and publish image

# Tagging strategy:
#   - push to a feature branch -> <short-sha>   (temporary build for that commit)
#   - push to main             -> latest
#   - push a git tag vX.Y.Z    -> X.Y.Z, X.Y, X (semver from the tag)
on:
  push:
    branches: ['**']
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  # Repo is named "-puma" (leading dash), which is not a valid Docker image
  # name, so we publish under a clean name: ghcr.io/<owner>/puma
  IMAGE_NAME: ${{ github.repository_owner }}/puma

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the amd64 runner build the linux/arm64 image (the VM is aarch64).
      # For much faster builds, switch `runs-on` to `ubuntu-24.04-arm` and remove
      # this QEMU step (native arm64, no emulation).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,enable=${{ startsWith(github.ref, 'refs/heads/') && github.ref != 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
